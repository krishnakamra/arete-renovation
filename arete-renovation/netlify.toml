# ============================================================
# ARETE RENOVATION — NETLIFY CONFIGURATION
# ============================================================

[build]
  publish = "."

# ── Security & Performance Headers ──────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── Cache static assets ──────────────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirects ────────────────────────────────────────────────
# www to non-www canonical redirect
[[redirects]]
  from = "https://www.areterenovation.ca/*"
  to = "https://areterenovation.ca/:splat"
  status = 301
  force = true

# 404 fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
